<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  </head>
  <style>
    .loading-spinner {
      margin: 36vh auto;
      display: block;
      width: 40px;
      height: 40px;
      background: url('/public/loading.svg') no-repeat center/cover;
      z-index: 9999;
      animation: rotate 4s linear infinite;
    }
    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
  </style>

    <div id="root">
      <span class="loading-spinner"></span>
    </div>
